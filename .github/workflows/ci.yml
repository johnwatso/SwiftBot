name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Build and Test
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run SwiftBot tests
        run: swift test --parallel

      - name: Run UpdateEngine tests
        run: swift test --package-path Sources/UpdateEngine --parallel

      - name: Validate Sparkle release pipeline
        run: ./scripts/validate_sparkle.sh
