name: Deploy website

on:
  push:
    branches:
      - main
    paths:
      - "Website/public/**"
      - "docs/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Overlay docs release metadata
        run: |
          if [ -d docs ]; then
            rsync -a docs/ Website/public/
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: Website/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
