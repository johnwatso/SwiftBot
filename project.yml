name: SwiftBot
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: 26.0
    PRODUCT_BUNDLE_IDENTIFIER: com.maxhewett.swiftbot
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.8.0
targets:
  SwiftBot:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SwiftBotApp
        excludes:
          - Resources
          - .DS_Store
    resources:
      - path: SwiftBotApp/Resources
        excludes:
          - .DS_Store
    settings:
      base:
        PRODUCT_NAME: SwiftBot
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: SwiftBot
        INFOPLIST_KEY_CFBundleName: SwiftBot
        INFOPLIST_KEY_LSMinimumSystemVersion: 26.0
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        INFOPLIST_KEY_SUEnableAutomaticChecks: YES
        INFOPLIST_KEY_SUFeedURL: "https://johnwatso.github.io/SwiftBot/appcast.xml"
        INFOPLIST_KEY_SUPublicEDKey: ""
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Sparkle
schemes:
  SwiftBot:
    build:
      targets:
        SwiftBot: all
    run:
      config: Debug
    archive:
      config: Release
