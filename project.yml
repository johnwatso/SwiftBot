name: SwiftBot
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.3"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  findCarthageFrameworks: false

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    majorVersion: 2.8.0
  swift-certificates:
    url: https://github.com/apple/swift-certificates.git
    majorVersion: 1.9.0
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    majorVersion: 3.12.3
  swift-asn1:
    url: https://github.com/apple/swift-asn1.git
    majorVersion: 1.1.0
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    majorVersion: 2.80.0
  swift-nio-ssl:
    url: https://github.com/apple/swift-nio-ssl.git
    majorVersion: 2.30.0
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    majorVersion: 2.9.6

targets:
  SwiftBot:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SwiftBotApp
        excludes:
          - Resources/**
          - TestSupport.swift
        type: group
      - path: SwiftBotApp/Resources/admin
        type: folder
        buildPhase: resources
      - path: SwiftBotApp/Resources/AppIcon.png
        type: file
        buildPhase: resources
      - path: SwiftBotApp/Resources/SwiftBird.png
        type: file
        buildPhase: resources
      - path: SwiftBot.icon
        type: file
        buildPhase: resources
    preBuildScripts:
      - name: SwiftLint
        script: "if which swiftlint > /dev/null; then swiftlint; fi"
        basedOnDependencyAnalysis: false
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: swift-certificates
        product: X509
      - package: swift-crypto
        product: Crypto
      - package: swift-asn1
        product: SwiftASN1
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - package: swift-nio-ssl
        product: NIOSSL
      - package: SwiftSoup
        product: SwiftSoup
    settings:
      base:
        PRODUCT_NAME: SwiftBot
        PRODUCT_BUNDLE_IDENTIFIER: com.example.swiftbot
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SDKROOT: macosx
        ARCHS: arm64
        INFOPLIST_FILE: SwiftBot-Info.plist
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: SwiftBot
        INFOPLIST_KEY_CFBundleName: SwiftBot
        INFOPLIST_KEY_LSApplicationCategoryType: ""
        INFOPLIST_KEY_LSMinimumSystemVersion: "26.0"
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "SwiftBot needs local network access to reach other leader/worker SwiftBots"
        INFOPLIST_KEY_SUEnableAutomaticChecks: YES
        INFOPLIST_KEY_SUFeedURL: "https://johnwatso.github.io/SwiftBot/appcast.xml"
        INFOPLIST_KEY_SUPublicEDKey: "rxaJsfCpTKtpqRubSfkJwKnztT5S8RHsdAueuT+jKck="
        ASSETCATALOG_COMPILER_APPICON_NAME: SwiftBot
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
        COMBINE_HIDPI_IMAGES: YES
        CURRENT_PROJECT_VERSION: "2026051514"
        MARKETING_VERSION: "1.10"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES
        AUTOMATION_APPLE_EVENTS: NO
        ENABLE_RESOURCE_ACCESS_AUDIO_INPUT: NO
        ENABLE_RESOURCE_ACCESS_CALENDARS: NO
        ENABLE_RESOURCE_ACCESS_CAMERA: NO
        ENABLE_RESOURCE_ACCESS_CONTACTS: NO
        ENABLE_RESOURCE_ACCESS_LOCATION: NO
        ENABLE_RESOURCE_ACCESS_PHOTO_LIBRARY: NO
        RUNTIME_EXCEPTION_ALLOW_DYLD_ENVIRONMENT_VARIABLES: NO
        RUNTIME_EXCEPTION_ALLOW_JIT: NO
        RUNTIME_EXCEPTION_ALLOW_UNSIGNED_EXECUTABLE_MEMORY: NO
        RUNTIME_EXCEPTION_DEBUGGING_TOOL: NO
        RUNTIME_EXCEPTION_DISABLE_EXECUTABLE_PAGE_PROTECTION: NO
        RUNTIME_EXCEPTION_DISABLE_LIBRARY_VALIDATION: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      debug:
        CODE_SIGNING_ALLOWED: NO
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        DEBUG_INFORMATION_FORMAT: dwarf
        GCC_OPTIMIZATION_LEVEL: "0"
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        ONLY_ACTIVE_ARCH: YES
      release:
        CODE_SIGNING_ALLOWED: YES
        SWIFT_COMPILATION_MODE: wholemodule
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        ENABLE_NS_ASSERTIONS: NO
        MTL_ENABLE_DEBUG_INFO: NO

  SwiftBotTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/SwiftBotTests
        type: group
    dependencies:
      - target: SwiftBot
    settings:
      base:
        PRODUCT_NAME: SwiftBotTests
        PRODUCT_BUNDLE_IDENTIFIER: com.example.swiftbot.tests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SDKROOT: macosx
        ARCHS: arm64
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SwiftBot.app/Contents/MacOS/SwiftBot"
        BUNDLE_LOADER: "$(TEST_HOST)"
      debug:
        CODE_SIGNING_ALLOWED: NO
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        DEBUG_INFORMATION_FORMAT: dwarf

  SparklePublisher:
    type: tool
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tools/SparklePublisher
    settings:
      base:
        PRODUCT_NAME: SparklePublisher
        PRODUCT_BUNDLE_IDENTIFIER: com.example.swiftbot.sparklepublisher
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SDKROOT: macosx
        ARCHS: arm64

schemes:
  SwiftBot:
    build:
      targets:
        SwiftBot: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: SwiftBotTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  SparklePublisher:
    build:
      targets:
        SparklePublisher: all
    run:
      config: Debug
    archive:
      config: Release
